# ╔═══════════════════════════════════════════════════════════════╗
# ║  netlify.toml — Root of your GitHub repository               ║
# ║  This file tells Netlify how to build each site.             ║
# ║  You will create TWO separate Netlify sites from ONE repo.   ║
# ╚═══════════════════════════════════════════════════════════════╝

# ── Default (used unless a site-specific context overrides it) ──
[build]
  publish = "."     # Fallback; overridden per-site in Netlify UI

# ── Headers for all sites ────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── PWA: serve manifest with correct MIME type ───────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# ── PWA: service worker must not be cached ───────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── SPA fallback: all routes → index.html ────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
